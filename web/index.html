<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>invtts · Kokoro Text to Speech</title>
<style>
  :root {
    --bg: #0b1020;
    --bg2: #111934;
    --panel: rgba(255,255,255,0.04);
    --panel-border: rgba(255,255,255,0.10);
    --text: #e8ecf6;
    --muted: #97a0c0;
    --accent: #7c5cff;
    --accent2: #22d3ee;
    --danger: #ff6b6b;
    --radius: 16px;
    --shadow: 0 20px 60px rgba(0,0,0,0.45);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 800px at 12% -10%, rgba(124,92,255,0.25), transparent 60%),
      radial-gradient(1000px 700px at 110% 10%, rgba(34,211,238,0.18), transparent 55%),
      linear-gradient(160deg, var(--bg), var(--bg2));
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 18px 60px;
  }
  .wrap { width: 100%; max-width: 860px; }
  header { text-align: center; margin-bottom: 28px; }
  .logo {
    display: inline-flex; align-items: center; gap: 12px;
    font-weight: 800; font-size: 30px; letter-spacing: -0.5px;
  }
  .logo .dot {
    width: 38px; height: 38px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: grid; place-items: center; box-shadow: 0 8px 24px rgba(124,92,255,0.5);
  }
  .logo .dot svg { width: 22px; height: 22px; }
  .tagline { color: var(--muted); margin-top: 10px; font-size: 15px; }
  .tagline a { color: var(--accent2); text-decoration: none; }

  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    padding: 22px;
  }

  label { display: block; font-size: 13px; color: var(--muted); margin: 0 0 8px; font-weight: 600; }

  textarea {
    width: 100%; min-height: 190px; resize: vertical;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--panel-border);
    color: var(--text);
    border-radius: 12px;
    padding: 16px;
    font-size: 16px; line-height: 1.5;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,255,0.25); }

  .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .count { color: var(--muted); font-size: 12px; }
  .ghost-btn {
    background: transparent; border: 1px solid var(--panel-border); color: var(--muted);
    border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; transition: all .15s;
  }
  .ghost-btn:hover { color: var(--text); border-color: var(--accent); }

  .controls {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px;
  }
  @media (max-width: 600px) { .controls { grid-template-columns: 1fr; } }

  select, input[type="range"] { width: 100%; }
  select {
    background: rgba(0,0,0,0.25); color: var(--text);
    border: 1px solid var(--panel-border); border-radius: 10px;
    padding: 11px 12px; font-size: 14px; outline: none;
  }
  select:focus { border-color: var(--accent); }
  select optgroup { color: var(--muted); background: var(--bg2); }
  select option { color: var(--text); background: var(--bg2); }

  .range-row { display: flex; align-items: center; gap: 12px; }
  input[type="range"] {
    -webkit-appearance: none; appearance: none; height: 6px; border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent2)); outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: #fff; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%; background: #fff; border: none; cursor: pointer;
  }
  .speed-val { min-width: 52px; text-align: right; font-variant-numeric: tabular-nums; font-size: 14px; }

  .actions { margin-top: 22px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn {
    border: none; cursor: pointer; font-weight: 700; font-size: 15px;
    padding: 14px 26px; border-radius: 12px; color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 10px 30px rgba(124,92,255,0.45); transition: transform .12s, opacity .15s;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); }
  .btn:disabled { opacity: .55; cursor: not-allowed; }
  .spinner {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
    animation: spin .7s linear infinite; display: none;
  }
  .btn.loading .spinner { display: inline-block; }
  .btn.loading .btn-label { opacity: .85; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status { font-size: 13px; color: var(--muted); }
  .status.error { color: var(--danger); }

  .result {
    margin-top: 22px; padding: 18px; border-radius: 14px;
    border: 1px solid var(--panel-border); background: rgba(0,0,0,0.22);
    display: none;
  }
  .result.show { display: block; animation: rise .25s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  audio { width: 100%; margin-bottom: 14px; }
  .result-actions { display: flex; gap: 10px; }
  .result-actions a, .result-actions button {
    text-decoration: none; font-size: 13px; font-weight: 600;
    padding: 9px 16px; border-radius: 9px; cursor: pointer;
    border: 1px solid var(--panel-border); background: transparent; color: var(--text);
  }
  .result-actions a:hover, .result-actions button:hover { border-color: var(--accent2); }

  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 24px; }
  .health { display: inline-flex; align-items: center; gap: 6px; margin-top: 6px; }
  .health .dot-status {
    width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
  }
  .health.ok .dot-status { background: #34d399; box-shadow: 0 0 8px rgba(52,211,153,0.6); }
  .health.bad .dot-status { background: var(--danger); box-shadow: 0 0 8px rgba(255,107,107,0.5); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">
        <span class="dot">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          </svg>
        </span>
        invtts
      </div>
      <div class="tagline">Paste text, pick a voice, and hear it — powered by the
        <a href="https://kokorottsai.com/#tryonline" target="_blank" rel="noopener">Kokoro</a> TTS model.</div>
    </header>

    <div class="card">
      <label for="text">Your text</label>
      <textarea id="text" placeholder="Paste or type anything you'd like to turn into natural speech…"></textarea>
      <div class="meta">
        <span class="count"><span id="charCount">0</span> characters</span>
        <button class="ghost-btn" id="clearBtn" type="button">Clear</button>
      </div>

      <div class="controls">
        <div>
          <label for="voice">Voice</label>
          <select id="voice"></select>
        </div>
        <div>
          <label for="format">Audio format</label>
          <select id="format">
            <option value="mp3">MP3</option>
            <option value="wav">WAV</option>
            <option value="opus">Opus</option>
            <option value="flac">FLAC</option>
            <option value="aac">AAC</option>
          </select>
        </div>
        <div style="grid-column: 1 / -1;">
          <label for="speed">Speed</label>
          <div class="range-row">
            <input type="range" id="speed" min="0.5" max="2" step="0.05" value="1" />
            <span class="speed-val" id="speedVal">1.00×</span>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="generateBtn" type="button">
          <span class="spinner"></span>
          <span class="btn-label">Generate speech</span>
        </button>
        <span class="status" id="status"></span>
      </div>

      <div class="result" id="result">
        <audio id="player" controls></audio>
        <div class="result-actions">
          <a id="downloadLink" download="speech.mp3">Download</a>
        </div>
      </div>
    </div>

    <footer>
      Runs locally · proxies to your Kokoro OpenAI-compatible endpoint
      <div class="health" id="health"><span class="dot-status"></span><span id="healthText">Checking Kokoro…</span></div>
    </footer>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const textEl = $("text"), voiceEl = $("voice"), formatEl = $("format"),
      speedEl = $("speed"), speedVal = $("speedVal"), genBtn = $("generateBtn"),
      statusEl = $("status"), result = $("result"), player = $("player"),
      dl = $("downloadLink"), charCount = $("charCount");

let lastURL = null;

textEl.addEventListener("input", () => { charCount.textContent = textEl.value.length.toLocaleString(); });
$("clearBtn").addEventListener("click", () => { textEl.value = ""; textEl.dispatchEvent(new Event("input")); textEl.focus(); });
speedEl.addEventListener("input", () => { speedVal.textContent = Number(speedEl.value).toFixed(2) + "×"; });

// Load voices grouped by language.
async function loadVoices() {
  try {
    const res = await fetch("/api/voices");
    const data = await res.json();
    voiceEl.innerHTML = "";
    for (const group of data.groups) {
      const og = document.createElement("optgroup");
      og.label = group.language;
      for (const v of group.voices) {
        const opt = document.createElement("option");
        opt.value = v.id;
        opt.textContent = v.name + " — " + v.id;
        if (v.id === data.default) opt.selected = true;
        og.appendChild(opt);
      }
      voiceEl.appendChild(og);
    }
  } catch (e) {
    setStatus("Could not load voices: " + e.message, true);
  }
}

function setStatus(msg, isError) {
  statusEl.textContent = msg || "";
  statusEl.classList.toggle("error", !!isError);
}

function setLoading(on) {
  genBtn.disabled = on;
  genBtn.classList.toggle("loading", on);
  genBtn.querySelector(".btn-label").textContent = on ? "Generating…" : "Generate speech";
}

async function generate() {
  const text = textEl.value.trim();
  if (!text) { setStatus("Please enter some text first.", true); textEl.focus(); return; }

  const format = formatEl.value;
  const voice = voiceEl.value;
  const speed = parseFloat(speedEl.value);

  setLoading(true);
  setStatus("Synthesizing with " + voice + "…");
  result.classList.remove("show");
  if (lastURL) { URL.revokeObjectURL(lastURL); lastURL = null; }

  const started = performance.now();
  try {
    const res = await fetch("/api/tts", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, voice, format, speed }),
    });

    if (!res.ok) {
      let msg = "Request failed (" + res.status + ")";
      try { const j = await res.json(); if (j.error) msg = j.error; } catch (_) {}
      throw new Error(msg);
    }

    const blob = await res.blob();
    lastURL = URL.createObjectURL(blob);
    player.src = lastURL;
    dl.href = lastURL;
    dl.download = "speech-" + voice + "." + format;
    result.classList.add("show");
    const secs = ((performance.now() - started) / 1000).toFixed(1);
    setStatus("Done in " + secs + "s · " + (blob.size / 1024).toFixed(0) + " KB");
    player.play().catch(() => {});
  } catch (e) {
    setStatus(e.message, true);
  } finally {
    setLoading(false);
  }
}

genBtn.addEventListener("click", generate);
// Ctrl/Cmd + Enter to generate.
textEl.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); generate(); }
});

loadVoices();

async function checkHealth() {
  const healthEl = $("health"), healthText = $("healthText");
  try {
    const res = await fetch("/api/health");
    const data = await res.json();
    if (res.ok && data.status === "ok") {
      healthEl.classList.add("ok");
      healthText.textContent = "Kokoro connected · " + data.endpoint;
    } else {
      healthEl.classList.add("bad");
      healthText.textContent = data.error || "Kokoro unavailable";
    }
  } catch (e) {
    healthEl.classList.add("bad");
    healthText.textContent = "Could not reach server";
  }
}
checkHealth();
</script>
</body>
</html>
